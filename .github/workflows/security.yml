# Security — Audit hebdomadaire des dépendances
# Vérifie les CVE connues chaque lundi

name: Security Audit

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  audit:
    name: Audit npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Audit des dépendances (niveau high)
        run: npm audit --audit-level=high
